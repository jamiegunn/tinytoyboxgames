<script>
;(function(){
  const room = document.getElementById('room')
  const owl = document.getElementById('owl')
  const hintText = document.getElementById('hint-text')
  const roomTitle = document.getElementById('room-title')
  const pupilL = document.getElementById('pupil-l')
  const pupilR = document.getElementById('pupil-r')
  const boxes = document.querySelectorAll('.toybox-spot')
  const interior = document.getElementById('toybox-interior')
  const interiorTitle = document.getElementById('interior-title')
  const interiorShelf = document.getElementById('interior-shelf')
  const interiorBack = document.getElementById('interior-back')
  let owlX, owlY, moveTimer, footprintTimer
  let hasInteracted = false
  let inInterior = false

  // Toybox data: maps box id → { theme, title, toys[] with CSS icon HTML }
  const TOYBOX_DATA = {
    'box-adventure': {
      theme: 'red', title: 'Adventure Box',
      toys: [
        { id: 'bubblePop', label: 'Bubble Pop', cls: 'toy-bubble',
          icon: '<div class="wand-stick"></div><div class="wand-ring"></div><div class="mini-bubble b1"></div><div class="mini-bubble b2"></div><div class="mini-bubble b3"></div>' },
        { id: 'balloonRace', label: 'Balloon Race', cls: 'toy-balloon',
          icon: '<div class="balloon-group"><div class="balloon-body b1"></div><div class="balloon-body b2"></div><div class="balloon-body b3"></div><div class="balloon-strings"></div></div>' },
        { id: 'monsterTruck', label: 'Monster Truck', cls: 'toy-truck',
          icon: '<div class="mtruck"><div class="mtruck-body"></div><div class="mtruck-cab"></div><div class="mtruck-window"></div><div class="mtruck-stripe"></div><div class="mtruck-axle"></div><div class="mtruck-wheel wl"></div><div class="mtruck-wheel wr"></div><div class="mtruck-dirt"></div></div>' },
      ]
    },
    'box-animals': {
      theme: 'blue', title: 'Animal Friends',
      toys: [
        { id: 'feedAnimal', label: 'Feed the Animal', cls: 'toy-frog',
          icon: '<div class="frog-body"><div class="frog-eye left"><div class="frog-pupil"></div></div><div class="frog-eye right"><div class="frog-pupil"></div></div><div class="frog-mouth"></div><div class="frog-cheek left"></div><div class="frog-cheek right"></div></div>' },
        { id: 'puppyFetch', label: 'Puppy Fetch', cls: 'toy-puppy',
          icon: '<div class="puppy"><div class="puppy-tail"></div><div class="puppy-leg bl"><div class="puppy-paw"></div></div><div class="puppy-leg br"><div class="puppy-paw"></div></div><div class="puppy-body"></div><div class="puppy-leg fl"><div class="puppy-paw"></div></div><div class="puppy-leg fr"><div class="puppy-paw"></div></div><div class="puppy-head"><div class="puppy-ear left"></div><div class="puppy-ear right"></div><div class="puppy-eye"></div><div class="puppy-muzzle"><div class="puppy-nose"></div><div class="puppy-tongue"></div></div></div><div class="puppy-ball"></div></div>' },
        { id: 'babyShark', label: 'Baby Shark', cls: 'toy-shark',
          icon: '<div class="shark"><div class="shark-body"><div class="shark-belly"></div><div class="shark-eye"></div><div class="shark-blush"></div><div class="shark-mouth"></div></div><div class="shark-fin"></div><div class="shark-tail"></div><div class="shark-fish"></div></div>' },
      ]
    },
    'box-creative': {
      theme: 'green', title: 'Creative Corner',
      toys: [
        { id: 'colorMatch', label: 'Color Match', cls: 'toy-paint',
          icon: '<div class="palette"><div class="palette-hole"></div><div class="paint-dot d1"></div><div class="paint-dot d2"></div><div class="paint-dot d3"></div><div class="paint-dot d4"></div><div class="paint-dot d5"></div></div><div class="paint-brush"></div>' },
        { id: 'shapeBuilder', label: 'Shape Builder', cls: 'toy-shapes',
          icon: '<div class="shape-circle"></div><div class="shape-triangle"></div><div class="shape-square"></div><div class="shape-star"></div>' },
        { id: 'cleanTheMess', label: 'Clean the Mess', cls: 'toy-sponge',
          icon: '<div class="sponge"><div class="sponge-hole h1"></div><div class="sponge-hole h2"></div><div class="sponge-hole h3"></div><div class="sponge-hole h4"></div><div class="sponge-hole h5"></div><div class="sponge-bubble sb1"></div><div class="sponge-bubble sb2"></div><div class="sponge-bubble sb3"></div></div>' },
      ]
    },
    'box-nature': {
      theme: 'purple', title: 'Nature Nook',
      toys: [
        { id: 'fireflies', label: 'Fireflies', cls: 'toy-jar',
          icon: '<div class="jar"><div class="jar-lid"></div><div class="jar-body"><div class="jar-fly f1"></div><div class="jar-fly f2"></div><div class="jar-fly f3"></div></div><div class="jar-shine"></div><div class="jar-glow"></div></div>' },
        { id: 'hideAndSeek', label: 'Hide and Seek', cls: 'toy-tree',
          icon: '<div class="tree"><div class="tree-trunk"></div><div class="tree-top"></div><div class="tree-top-2"></div><div class="peek-eyes"><div class="peek-eye"></div><div class="peek-eye"></div></div></div>' },
        { id: 'elephantSplash', label: 'Elephant Splash', cls: 'toy-elephant',
          icon: '<div class="elephant"><div class="ele-body"></div><div class="ele-head"><div class="ele-ear"></div><div class="ele-eye"></div><div class="ele-trunk"></div></div><div class="ele-legs"><div class="ele-leg"></div><div class="ele-leg"></div><div class="ele-leg"></div><div class="ele-leg"></div></div><div class="ele-splash s1"></div><div class="ele-splash s2"></div><div class="ele-splash s3"></div></div>' },
      ]
    }
  }

  // ====== OWL INIT ======
  function initOwl() {
    owlX = room.offsetWidth / 2 - 22
    owlY = room.offsetHeight / 2 - 22
    owl.style.left = owlX + 'px'
    owl.style.top = owlY + 'px'
  }
  initOwl()
  window.addEventListener('resize', () => {
    owlX = Math.min(owlX, room.offsetWidth - 44)
    owlY = Math.min(owlY, room.offsetHeight - 44)
    owl.style.left = owlX + 'px'
    owl.style.top = owlY + 'px'
  })

  // Eye tracking
  document.addEventListener('mousemove', function(e) {
    const rect = owl.getBoundingClientRect()
    const cx = rect.left + rect.width / 2
    const cy = rect.top + rect.height / 2
    const dx = (e.clientX - cx) / window.innerWidth
    const dy = (e.clientY - cy) / window.innerHeight
    const px = Math.max(-2, Math.min(2, dx * 6)) + 'px'
    const py = Math.max(-2, Math.min(2, dy * 4)) + 'px'
    pupilL.style.transform = 'translateX(calc(-50% + ' + px + ')) translateY(' + py + ')'
    pupilR.style.transform = 'translateX(calc(-50% + ' + px + ')) translateY(' + py + ')'
  })

  // ====== MOVE OWL ======
  function moveOwl(tx, ty, quiet, onArrive) {
    if (inInterior) return
    tx = Math.max(10, Math.min(room.offsetWidth - 54, tx - 22))
    ty = Math.max(10, Math.min(room.offsetHeight - 54, ty - 22))

    const dx = tx - owlX, dy = ty - owlY
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < 5) { if (onArrive) onArrive(); return }
    const duration = Math.min(1.5, Math.max(0.3, dist / 350))

    owl.style.transition = 'left ' + duration + 's cubic-bezier(0.25,0.1,0.25,1),' +
      'top ' + duration + 's cubic-bezier(0.25,0.1,0.25,1)'
    owl.style.left = tx + 'px'
    owl.style.top = ty + 'px'
    owl.classList.add('walking')

    // Footprints
    clearInterval(footprintTimer)
    let steps = 0
    const maxSteps = Math.floor(duration / 0.12)
    footprintTimer = setInterval(() => {
      if (steps >= maxSteps) { clearInterval(footprintTimer); return }
      const progress = steps / maxSteps
      const fpX = owlX + dx * progress + 22
      const fpY = owlY + dy * progress + 40
      const fp = document.createElement('div')
      fp.className = 'footprint'
      fp.style.left = fpX + (steps % 2 ? 3 : -3) + 'px'
      fp.style.top = fpY + 'px'
      room.appendChild(fp)
      setTimeout(() => fp.remove(), 2000)
      steps++
    }, duration * 1000 / maxSteps)

    playFootsteps(duration)

    if (!quiet) {
      const ring = document.createElement('div')
      ring.className = 'click-ring'
      ring.style.left = (tx + 22) + 'px'
      ring.style.top = (ty + 22) + 'px'
      room.appendChild(ring)
      setTimeout(() => ring.remove(), 700)
    }

    clearTimeout(moveTimer)
    moveTimer = setTimeout(() => {
      owl.classList.remove('walking')
      owlX = tx; owlY = ty
      clearInterval(footprintTimer)
      if (onArrive) onArrive()
    }, duration * 1000)
  }

  // ====== SOUNDS ======
  function playFootsteps(duration) {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      const count = Math.min(6, Math.max(2, Math.floor(duration / 0.15)))
      for (let i = 0; i < count; i++) {
        const t = now + i * (duration / count)
        const osc = ctx.createOscillator(), g = ctx.createGain()
        osc.type = 'sine'
        osc.frequency.setValueAtTime(200 + Math.random() * 60, t)
        osc.frequency.exponentialRampToValueAtTime(120, t + 0.04)
        g.gain.setValueAtTime(0.06, t)
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06)
        osc.connect(g); g.connect(ctx.destination)
        osc.start(t); osc.stop(t + 0.08)
      }
    } catch(e) {}
  }

  function playOpenChime() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      ;[523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain()
        osc.type = 'sine'
        osc.frequency.setValueAtTime(freq, now + i * 0.07)
        g.gain.setValueAtTime(0, now + i * 0.07)
        g.gain.linearRampToValueAtTime(0.1, now + i * 0.07 + 0.01)
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.35)
        osc.connect(g); g.connect(ctx.destination)
        osc.start(now + i * 0.07); osc.stop(now + i * 0.07 + 0.4)
        const o2 = ctx.createOscillator(), g2 = ctx.createGain()
        o2.type = 'sine'
        o2.frequency.setValueAtTime(freq * 2, now + i * 0.07)
        g2.gain.setValueAtTime(0, now + i * 0.07)
        g2.gain.linearRampToValueAtTime(0.03, now + i * 0.07 + 0.01)
        g2.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.2)
        o2.connect(g2); g2.connect(ctx.destination)
        o2.start(now + i * 0.07); o2.stop(now + i * 0.07 + 0.25)
      })
    } catch(e) {}
  }

  // ====== OWL VOCALIZATIONS ======
  function playOwlHoot() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      for (let i = 0; i < 2; i++) {
        const t = now + i * 0.28
        const osc = ctx.createOscillator(), g = ctx.createGain()
        osc.type = 'sine'
        osc.frequency.setValueAtTime(390, t)
        osc.frequency.exponentialRampToValueAtTime(310, t + 0.18)
        g.gain.setValueAtTime(0, t)
        g.gain.linearRampToValueAtTime(0.09, t + 0.02)
        g.gain.setValueAtTime(0.07, t + 0.06)
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22)
        osc.connect(g); g.connect(ctx.destination)
        osc.start(t); osc.stop(t + 0.25)
        // Breathy overtone
        const o2 = ctx.createOscillator(), g2 = ctx.createGain()
        o2.type = 'triangle'
        o2.frequency.setValueAtTime(780, t)
        o2.frequency.exponentialRampToValueAtTime(620, t + 0.18)
        g2.gain.setValueAtTime(0, t)
        g2.gain.linearRampToValueAtTime(0.02, t + 0.02)
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15)
        o2.connect(g2); g2.connect(ctx.destination)
        o2.start(t); o2.stop(t + 0.2)
      }
    } catch(e) {}
  }

  function playOwlGiggle() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      for (let i = 0; i < 4; i++) {
        const t = now + i * 0.09
        const osc = ctx.createOscillator(), g = ctx.createGain()
        osc.type = 'sine'
        osc.frequency.setValueAtTime(620 + i * 40, t)
        osc.frequency.exponentialRampToValueAtTime(480, t + 0.05)
        g.gain.setValueAtTime(0, t)
        g.gain.linearRampToValueAtTime(0.06, t + 0.01)
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.07)
        osc.connect(g); g.connect(ctx.destination)
        osc.start(t); osc.stop(t + 0.09)
      }
    } catch(e) {}
  }

  function playOwlChirp() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      const osc = ctx.createOscillator(), g = ctx.createGain()
      osc.type = 'sine'
      osc.frequency.setValueAtTime(480, now)
      osc.frequency.exponentialRampToValueAtTime(720, now + 0.06)
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.15)
      g.gain.setValueAtTime(0, now)
      g.gain.linearRampToValueAtTime(0.07, now + 0.02)
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.18)
      osc.connect(g); g.connect(ctx.destination)
      osc.start(now); osc.stop(now + 0.2)
    } catch(e) {}
  }

  function playOwlExcited() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      // Rising trill: quick ascending notes
      ;[440, 520, 600, 720, 880].forEach((freq, i) => {
        const t = now + i * 0.06
        const osc = ctx.createOscillator(), g = ctx.createGain()
        osc.type = 'sine'
        osc.frequency.setValueAtTime(freq, t)
        g.gain.setValueAtTime(0, t)
        g.gain.linearRampToValueAtTime(0.07, t + 0.01)
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08)
        osc.connect(g); g.connect(ctx.destination)
        osc.start(t); osc.stop(t + 0.1)
      })
    } catch(e) {}
  }

  // ====== ANIMAL SOUNDS ======
  function playWoof() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      // Short punchy bark
      const osc = ctx.createOscillator(), g = ctx.createGain()
      osc.type = 'sawtooth'
      osc.frequency.setValueAtTime(350, now)
      osc.frequency.exponentialRampToValueAtTime(180, now + 0.12)
      g.gain.setValueAtTime(0.12, now)
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15)
      osc.connect(g).connect(ctx.destination)
      osc.start(now); osc.stop(now + 0.15)
    } catch(e){}
  }
  function playMeow() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      // High-pitched sliding mew
      const osc = ctx.createOscillator(), g = ctx.createGain()
      osc.type = 'sine'
      osc.frequency.setValueAtTime(700, now)
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.2)
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.3)
      g.gain.setValueAtTime(0.08, now)
      g.gain.linearRampToValueAtTime(0.06, now + 0.15)
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.35)
      osc.connect(g).connect(ctx.destination)
      osc.start(now); osc.stop(now + 0.35)
    } catch(e){}
  }
  function playRoar() {
    try {
      const ctx = window._sharedAudioCtx; if (!ctx) return
      const now = ctx.currentTime
      // Low rumbling roar
      const osc = ctx.createOscillator(), g = ctx.createGain()
      const osc2 = ctx.createOscillator(), g2 = ctx.createGain()
      osc.type = 'sawtooth'
      osc.frequency.setValueAtTime(120, now)
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.3)
      g.gain.setValueAtTime(0.1, now)
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.35)
      osc.connect(g).connect(ctx.destination)
      osc.start(now); osc.stop(now + 0.35)
      // Add gritty overtone
      osc2.type = 'square'
      osc2.frequency.setValueAtTime(95, now)
      osc2.frequency.exponentialRampToValueAtTime(60, now + 0.3)
      g2.gain.setValueAtTime(0.04, now)
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3)
      osc2.connect(g2).connect(ctx.destination)
      osc2.start(now); osc2.stop(now + 0.3)
    } catch(e){}
  }

  function playRandomOwlSound() {
    const r = Math.random()
    if (r < 0.35) playOwlHoot()
    else if (r < 0.65) playOwlGiggle()
    else playOwlChirp()
  }

  // ====== SPARKLE BURST ======
  function burstSparkles(el) {
    const rect = el.getBoundingClientRect()
    const rr = room.getBoundingClientRect()
    const cx = rect.left - rr.left + rect.width / 2
    const cy = rect.top - rr.top + rect.height / 2
    const colors = ['#ffd700','#ff6b6b','#54a0ff','#26de81','#a55eea','#ff9f43','#fff']
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div')
      p.className = 'sparkle-p'
      const angle = (Math.PI * 2 * i) / 14 + (Math.random() - 0.5) * 0.5
      const dist = 25 + Math.random() * 40
      const size = 3 + Math.random() * 4
      p.style.cssText =
        'left:' + cx + 'px;top:' + cy + 'px;width:' + size + 'px;height:' + size + 'px;' +
        'background:' + colors[i % colors.length] + ';' +
        'box-shadow:0 0 4px ' + colors[i % colors.length] + ';' +
        '--tx:' + (Math.cos(angle) * dist) + 'px;--ty:' + (Math.sin(angle) * dist) + 'px;'
      room.appendChild(p)
      setTimeout(() => p.remove(), 800)
    }
  }

  // ====== INTERIOR VIEW ======
  function openInterior(boxId) {
    const data = TOYBOX_DATA[boxId]
    if (!data) return
    inInterior = true

    // Set theme & title
    interior.setAttribute('data-theme', data.theme)
    interiorTitle.textContent = data.title

    // Build toy buttons with full CSS icons (matching toybox.html)
    interiorShelf.innerHTML = ''
    data.toys.forEach((toy, i) => {
      const btn = document.createElement('button')
      btn.className = 'toy ' + toy.cls
      btn.setAttribute('aria-label', toy.label)
      btn.style.animationDelay = (i * 0.12) + 's'
      btn.innerHTML =
        '<div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>' +
        '<div class="toy-icon">' + toy.icon + '</div>'
      btn.addEventListener('click', () => startGame(toy.id))
      interiorShelf.appendChild(btn)
    })

    // Add decorative sparkles
    interior.querySelectorAll('.interior-sparkle').forEach(s => s.remove())
    const sparkColors = { red: '#ff6b6b', blue: '#54a0ff', green: '#26de81', purple: '#a55eea' }
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div')
      s.className = 'interior-sparkle'
      s.style.cssText =
        'left:' + (5 + Math.random() * 90) + '%;top:' + (10 + Math.random() * 80) + '%;' +
        'background:' + (sparkColors[data.theme] || '#ffd700') + ';' +
        'animation-delay:' + (Math.random() * 2.5) + 's;' +
        'width:' + (4 + Math.random() * 4) + 'px;height:' + (4 + Math.random() * 4) + 'px;'
      interior.appendChild(s)
    }

    // Hide room, show interior
    room.style.display = 'none'
    roomTitle.style.display = 'none'
    hintText.style.display = 'none'
    interior.classList.add('visible')
    // Trigger reflow then animate in
    interior.offsetHeight
    interior.classList.add('show')

    // Blinking arrow hint — picks a random toy, blinks 3x, repeats every 5s
    clearInterval(interior._arrowTimer)
    function showArrowHint() {
      if (!inInterior) return
      const toys = interiorShelf.querySelectorAll('.toy')
      if (!toys.length) return
      // Remove any existing arrow
      interiorShelf.querySelectorAll('.tap-arrow').forEach(a => a.remove())
      // Pick random toy
      const pick = toys[Math.floor(Math.random() * toys.length)]
      const arrow = document.createElement('div')
      arrow.className = 'tap-arrow'
      arrow.textContent = '\u2191' // up arrow ↑
      pick.appendChild(arrow)
      // Trigger blink
      requestAnimationFrame(() => {
        arrow.classList.add('blink')
        // Remove after blink finishes (3 × 0.5s = 1.5s)
        setTimeout(() => arrow.remove(), 1600)
      })
    }
    // First arrow after 1s, then every 5s
    setTimeout(showArrowHint, 1000)
    interior._arrowTimer = setInterval(showArrowHint, 5000)
  }

  function closeInterior() {
    inInterior = false
    clearInterval(interior._arrowTimer)
    interior.classList.remove('show')
    setTimeout(() => {
      interior.classList.remove('visible')
      room.style.display = ''
      roomTitle.style.display = ''
      hintText.style.display = ''
      boxes.forEach(b => b.classList.remove('open'))
    }, 350)
  }

  interiorBack.addEventListener('click', closeInterior)

  // ====== ROOM CLICK/TAP ======
  function handleRoomTap(x, y) {
    if (inInterior) return
    moveOwl(x, y)
    if (!hasInteracted) {
      hasInteracted = true
      hintText.style.opacity = '0'
      hintText.style.transition = 'opacity 0.5s'
    }
  }

  room.addEventListener('click', function(e) {
    if (e.target.closest('.toy') || e.target.closest('.music-box-spot') || e.target.closest('.toybox-spot')) return
    const rect = room.getBoundingClientRect()
    handleRoomTap(e.clientX - rect.left, e.clientY - rect.top)
  })

  room.addEventListener('touchstart', function(e) {
    if (e.target.closest('.toy') || e.target.closest('.music-box-spot') || e.target.closest('.toybox-spot')) return
    const rect = room.getBoundingClientRect()
    const touch = e.touches[0]
    handleRoomTap(touch.clientX - rect.left, touch.clientY - rect.top)
  }, { passive: true })

  // Click toybox → owl walks there, then opens
  let pendingBoxOpen = null
  boxes.forEach(box => {
    box.addEventListener('click', function(e) {
      if (e.target.closest('.toy') || inInterior || pendingBoxOpen) return
      e.stopPropagation()
      pendingBoxOpen = box.id
      const rect = box.getBoundingClientRect()
      const rr = room.getBoundingClientRect()
      moveOwl(
        rect.left - rr.left + rect.width / 2,
        rect.top - rr.top + rect.height / 2,
        false,
        function() {
          // Owl arrived — sparkle + chime + excited sound
          box.classList.add('open')
          burstSparkles(box)
          playOpenChime()
          playOwlExcited()
          // 1 second pause to admire the open chest
          setTimeout(() => {
            openInterior(box.id)
            pendingBoxOpen = null
          }, 1200)
        }
      )
    })
  })

  // ====== GAME START/HOME ======
  window.addEventListener('game:start', () => {
    // Hide both room and interior
    owl.style.display = 'none'
    interior.classList.remove('show', 'visible')
    inInterior = false
    boxes.forEach(b => b.classList.remove('open'))
    clearTimeout(idleTimer)
    window._musicWasPlaying = window._toyboxMusic && window._toyboxMusic.isPlaying()
    if (window._toyboxMusic) window._toyboxMusic.stop()
  })

  window.addEventListener('game:home', () => {
    // Always return to the room view
    owl.style.display = ''
    room.style.display = ''
    roomTitle.style.display = ''
    hintText.style.display = ''
    inInterior = false
    resetIdle()
    if (window._musicWasPlaying && window._toyboxMusic) window._toyboxMusic.start()
  })

  // ====== AUTO-EXPLORE ======
  let idleTimer = null
  const wanderTargets = [
    { sel: '#box-adventure' }, { sel: '#box-animals' },
    { sel: '#box-creative' }, { sel: '#box-nature' },
    { sel: '.bookshelf' },
    { sel: '.music-box-spot' },
    { sel: '.plant' }, { sel: '.rug' },
  ]
  function getWanderTarget() {
    if (Math.random() < 0.25) {
      return {
        x: 60 + Math.random() * (room.offsetWidth - 120),
        y: 60 + Math.random() * (room.offsetHeight - 120)
      }
    }
    const pick = wanderTargets[Math.floor(Math.random() * wanderTargets.length)]
    const els = room.querySelectorAll(pick.sel)
    const el = els[Math.floor(Math.random() * els.length)]
    if (!el) return { x: room.offsetWidth / 2, y: room.offsetHeight / 2 }
    const rect = el.getBoundingClientRect()
    const rr = room.getBoundingClientRect()
    const ox = (Math.random() - 0.5) * 50
    const oy = (Math.random() - 0.5) * 50
    return {
      x: rect.left - rr.left + rect.width / 2 + ox,
      y: rect.top - rr.top + rect.height / 2 + oy
    }
  }
  function resetIdle() {
    clearTimeout(idleTimer)
    idleTimer = setTimeout(autoWander, 3000 + Math.random() * 4000)
  }
  function autoWander() {
    if (owl.style.display === 'none' || inInterior || pendingBoxOpen) { resetIdle(); return }
    const t = getWanderTarget()
    moveOwl(t.x, t.y, true)
    // Random chance of a cute owl sound
    if (Math.random() < 0.6) {
      setTimeout(playRandomOwlSound, 200 + Math.random() * 400)
    }
    resetIdle()
  }
  room.addEventListener('click', resetIdle)
  resetIdle()

  // ====== WALKING ANIMALS (every ~5 seconds) ======
  const CRITTERS = [
    {
      name: 'golden-retriever',
      w: 52,
      html: '<div class="critter-dog">' +
        '<div class="dog-shadow"></div>' +
        '<div class="chase-ball"></div>' +
        '<div class="dog-ear l"></div><div class="dog-ear r"></div>' +
        '<div class="dog-head"></div>' +
        '<div class="dog-eye"></div><div class="dog-nose"></div><div class="dog-tongue"></div>' +
        '<div class="dog-body"></div>' +
        '<div class="dog-tail"></div>' +
        '<div class="dog-leg fl"></div><div class="dog-leg fr"></div>' +
        '<div class="dog-leg bl"></div><div class="dog-leg br"></div></div>'
    },
    {
      name: 'trex',
      w: 48,
      html: '<div class="critter-trex">' +
        '<div class="trex-shadow"></div>' +
        '<div class="trex-tail"></div>' +
        '<div class="trex-body"></div>' +
        '<div class="trex-arm l"></div><div class="trex-arm r"></div>' +
        '<div class="trex-head"></div>' +
        '<div class="trex-jaw"></div><div class="trex-teeth"></div>' +
        '<div class="trex-eye"></div>' +
        '<div class="trex-leg l"></div><div class="trex-leg r"></div></div>'
    },
    {
      name: 'kitty',
      w: 38,
      html: '<div class="critter-kitty">' +
        '<div class="kitty-shadow"></div>' +
        '<div class="kitty-tail"></div>' +
        '<div class="kitty-ear l"></div><div class="kitty-ear r"></div>' +
        '<div class="kitty-head"></div>' +
        '<div class="kitty-eyes"><div class="kitty-eyeball"></div><div class="kitty-eyeball"></div></div>' +
        '<div class="kitty-nose"></div>' +
        '<div class="kitty-whisker l"></div><div class="kitty-whisker r"></div>' +
        '<div class="kitty-body"></div>' +
        '<div class="kitty-paw fl"></div><div class="kitty-paw fr"></div>' +
        '<div class="kitty-paw bl"></div><div class="kitty-paw br"></div></div>'
    },
    {
      name: 'sharks',
      w: 70,
      html: '<div class="critter-sharks">' +
        '<div class="shark-sm">' +
          '<div class="sk-body"></div><div class="sk-fin"></div><div class="sk-tail"></div><div class="sk-eye"></div>' +
        '</div>' +
        '<div class="panic-bubbles"><div class="panic-bubble"></div><div class="panic-bubble"></div><div class="panic-bubble"></div></div>' +
        '<div class="shark-lg">' +
          '<div class="sk-body"></div><div class="sk-fin"></div><div class="sk-tail"></div>' +
          '<div class="sk-eye"></div><div class="sk-teeth"></div><div class="sk-mouth"></div>' +
        '</div></div>'
    }
  ]

  // Safe walk lanes (Y% from top) — clear horizontal bands between furniture/toys
  // Avoids: bookshelf(2-10%), toyboxes(16-26%), floor items(28-42%), rug center(46-56%),
  //         bear/crayons(56-70%), bottom toyboxes(70-80%), bottom toys/music(80-92%)
  const WALK_LANES = [13, 14, 15, 44, 45, 55, 56]

  function spawnAnimal() {
    if (inInterior || owl.style.display === 'none') return
    const critter = CRITTERS[Math.floor(Math.random() * CRITTERS.length)]
    const el = document.createElement('div')
    el.className = 'walking-animal'

    // Pick a safe lane that doesn't overlap room items
    const yPct = WALK_LANES[Math.floor(Math.random() * WALK_LANES.length)]
    // Walk direction: left-to-right or right-to-left
    const goRight = Math.random() > 0.5
    const rw = room.offsetWidth
    const dur = 3.5 + Math.random() * 3 // 3.5-6.5 seconds

    el.style.cssText =
      'top:' + yPct + '%;' +
      (goRight ? 'left:-' + (critter.w + 10) + 'px;' : 'right:-' + (critter.w + 10) + 'px;') +
      '--start-x:0px;--end-x:' + (goRight ? (rw + critter.w + 20) : -(rw + critter.w + 20)) + 'px;' +
      '--walk-dur:' + dur + 's;'

    // Animals face left by default (head on left side).
    // Flip to face right when walking right.
    if (goRight) el.style.setProperty('--flip','scaleX(-1)')
    el.innerHTML = '<div style="transform:var(--flip,none)">' + critter.html + '</div>'
    room.appendChild(el)

    // Animal sounds — play 2-3 times during the walk
    const soundFn = critter.name === 'golden-retriever' ? playWoof
      : critter.name === 'kitty' ? playMeow
      : critter.name === 'trex' ? playRoar : null
    if (soundFn) {
      const count = 2 + Math.floor(Math.random() * 2) // 2-3 sounds
      for (let i = 0; i < count; i++) {
        setTimeout(soundFn, (dur * 1000 * (i + 1)) / (count + 1))
      }
    }

    // Remove after animation
    setTimeout(() => el.remove(), dur * 1000 + 100)
  }

  let animalTimer = setInterval(spawnAnimal, 5000)
  // Spawn one quickly on load
  setTimeout(spawnAnimal, 1500)

  // Pause animals during game
  window.addEventListener('game:start', () => { clearInterval(animalTimer) })
  window.addEventListener('game:home', () => {
    animalTimer = setInterval(spawnAnimal, 5000)
  })
})();

// Music box
window.toggleMusicBox = function() {
  if (window._toyboxMusic) window._toyboxMusic.toggle()
  const el = document.getElementById('music-box')
  if (el) el.classList.toggle('open')
}
</script>

<!-- AudioContext unlock -->
<script>
document.addEventListener('click', function u() {
  var c = window._sharedAudioCtx;
  if (c && c.state === 'suspended') c.resume();
  document.removeEventListener('click', u);
});
document.addEventListener('touchstart', function u() {
  var c = window._sharedAudioCtx;
  if (c && c.state === 'suspended') c.resume();
  document.removeEventListener('touchstart', u);
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tiny Toybox</title>
<script>
// ADR-009: No persistent storage. This overrides Storage globally
// to ensure no game, library, or extension can store data.
// WARNING: This will break any code that expects localStorage to work.
Storage.prototype.setItem = function(){};
Storage.prototype.getItem = function(){ return null; };
Storage.prototype.removeItem = function(){};
Storage.prototype.clear = function(){};
</script>
<link rel="icon" type="image/svg+xml" href="/assets/favicon-4TcQ6MWZ.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/toybox-Dy5ybJ3Y.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-Bk1utTOF.js">
  <link rel="stylesheet" crossorigin href="/assets/app-Cot3y9DE.css">
  <link rel="stylesheet" crossorigin href="/assets/toybox-BMfURNyP.css">
</head>

<body>

<div id="menu">

  <!-- ============ PLAYROOM ENVIRONMENT ============ -->

  <!-- Wooden floor -->
  <div class="playroom-floor"></div>

  <!-- White wainscoting -->
  <div class="wainscoting"></div>
  <div class="chair-rail"></div>
  <div class="baseboard"></div>

  <!-- Window with sky, clouds, tree branch, curtains -->
  <div class="window">
    <div class="window-sky">
      <div class="window-cloud" style="top: 12px; width: 30px; height: 14px; animation-delay: 0s;"></div>
      <div class="window-cloud" style="top: 30px; width: 22px; height: 10px; animation-delay: -8s; left: 20px;"></div>
      <div class="window-branch">
        <div class="window-branch-stem"></div>
        <div class="window-leaf" style="top: 4px; right: 16px; transform: rotate(-20deg);"></div>
        <div class="window-leaf" style="top: 12px; right: 8px; transform: rotate(10deg); animation-delay: 0.5s;"></div>
        <div class="window-leaf" style="top: 2px; right: 28px; transform: rotate(-40deg); animation-delay: 1s; width: 10px; height: 7px;"></div>
        <div class="window-leaf" style="top: 18px; right: 20px; transform: rotate(25deg); animation-delay: 1.5s;"></div>
      </div>
    </div>
    <div class="window-frame"></div>
    <div class="window-cross-h"></div>
    <div class="window-cross-v"></div>
    <div class="window-sill"></div>
    <div class="curtain left"></div>
    <div class="curtain right"></div>
    <div class="curtain-rod"></div>
  </div>

  <!-- Sunbeam from window -->
  <div class="sunbeam" style="top: 6%; right: 2%; width: 180px; height: 70vh; transform: skewX(-15deg);"></div>

  <!-- Wall clock -->
  <div class="wall-clock">
    <div class="clock-face">
      <div class="clock-num" style="top: 3px; left: 50%; transform: translateX(-50%);">12</div>
      <div class="clock-num" style="right: 3px; top: 50%; transform: translateY(-50%);">3</div>
      <div class="clock-num" style="bottom: 2px; left: 50%; transform: translateX(-50%);">6</div>
      <div class="clock-num" style="left: 4px; top: 50%; transform: translateY(-50%);">9</div>
      <div class="clock-hand hour"></div>
      <div class="clock-hand minute"></div>
      <div class="clock-center"></div>
    </div>
  </div>

  <!-- Picture frames with "kid drawings" -->
  <div class="picture-frame" style="top: 5%; left: 32%; width: 52px; height: 42px; transform: rotate(-3deg);">
    <div class="frame-border"></div>
    <div class="frame-art" id="frame-art-1"></div>
  </div>
  <div class="picture-frame" style="top: 12%; left: 50%; width: 44px; height: 50px; transform: rotate(2deg);">
    <div class="frame-border"></div>
    <div class="frame-art" id="frame-art-2"></div>
  </div>

  <!-- Wall stickers -->
  <div class="wall-sticker sticker-star" style="top: 8%; left: 22%; background: #feca57; transform: rotate(15deg);"></div>
  <div class="wall-sticker sticker-star" style="top: 18%; right: 25%; background: #54a0ff; transform: rotate(-10deg); width: 16px; height: 16px;"></div>
  <div class="wall-sticker sticker-star" style="top: 3%; left: 55%; background: #ff9ff3; transform: rotate(30deg); width: 14px; height: 14px;"></div>
  <div class="wall-sticker sticker-heart" style="top: 15%; left: 15%; background: #ff6b6b; transform: rotate(-8deg);"></div>
  <div class="wall-sticker sticker-star" style="top: 22%; left: 42%; background: #26de81; transform: rotate(22deg); width: 12px; height: 12px;"></div>

  <!-- Fairy / string lights -->
  <div class="fairy-lights" id="fairy-lights"></div>

  <!-- Side table with music box -->
  <div class="side-table">
    <div class="side-table-top">
      <div class="music-box" id="music-box" onclick="toggleMusicBox()">
        <div class="music-box-notes">
          <span class="music-note">&#9835;</span>
          <span class="music-note">&#9833;</span>
          <span class="music-note">&#9834;</span>
        </div>
        <div class="music-box-interior">
          <div class="music-box-star"></div>
        </div>
        <div class="music-box-lid">
          <div class="music-box-lid-inner"></div>
        </div>
        <div class="music-box-body">
          <div class="music-box-clasp"></div>
        </div>
        <div class="music-box-hint"></div>
      </div>
    </div>
    <div class="side-table-legs">
      <div class="side-table-leg"></div>
      <div class="side-table-leg"></div>
    </div>
  </div>

  <!-- Area rug on floor -->
  <div class="area-rug"></div>

  <!-- Floor toys -->
  <div class="floor-toy alpha-block" style="bottom: 6%; left: 12%; background: #ff6b6b; transform: rotate(-12deg);">A</div>
  <div class="floor-toy alpha-block" style="bottom: 8%; left: 18%; background: #54a0ff; transform: rotate(8deg);">B</div>
  <div class="floor-toy alpha-block" style="bottom: 5%; right: 15%; background: #26de81; transform: rotate(-5deg);">C</div>
  <div class="floor-toy floor-crayon" style="bottom: 4%; left: 35%; background: #ff6b6b; transform: rotate(-25deg);"></div>
  <div class="floor-toy floor-crayon" style="bottom: 6%; left: 40%; background: #54a0ff; transform: rotate(10deg);"></div>
  <div class="floor-toy floor-crayon" style="bottom: 3%; left: 43%; background: #feca57; transform: rotate(-40deg);"></div>
  <div class="floor-toy floor-ball" style="bottom: 7%; right: 28%;"></div>
  <div class="floor-toy floor-truck" style="bottom: 4%; right: 38%; transform: rotate(5deg);"></div>

  <!-- ============ TITLE + SHELF + TOYS ============ -->

  <div class="title-plate">
    <h1>Tiny Toybox</h1>
  </div>

  <div class="shelf">
    <div class="shelf-row">
      <button class="toy toy-bubble" onclick="startGame('bubblePop')" aria-label="Bubble Pop">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="wand-stick"></div>
          <div class="wand-ring"></div>
          <div class="mini-bubble b1"></div>
          <div class="mini-bubble b2"></div>
          <div class="mini-bubble b3"></div>
        </div>
      </button>
      <button class="toy toy-frog" onclick="startGame('feedAnimal')" aria-label="Feed the Animal">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="frog-body">
            <div class="frog-eye left"><div class="frog-pupil"></div></div>
            <div class="frog-eye right"><div class="frog-pupil"></div></div>
            <div class="frog-mouth"></div>
            <div class="frog-cheek left"></div>
            <div class="frog-cheek right"></div>
          </div>
        </div>
      </button>
      <button class="toy toy-paint" onclick="startGame('colorMatch')" aria-label="Color Match">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="palette">
            <div class="palette-hole"></div>
            <div class="paint-dot d1"></div>
            <div class="paint-dot d2"></div>
            <div class="paint-dot d3"></div>
            <div class="paint-dot d4"></div>
            <div class="paint-dot d5"></div>
          </div>
          <div class="paint-brush"></div>
        </div>
      </button>
    </div>

    <div class="shelf-row" style="margin-top: 28px;">
      <button class="toy toy-jar" onclick="startGame('fireflies')" aria-label="Fireflies">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="jar">
            <div class="jar-lid"></div>
            <div class="jar-body">
              <div class="jar-fly f1"></div>
              <div class="jar-fly f2"></div>
              <div class="jar-fly f3"></div>
            </div>
            <div class="jar-shine"></div>
            <div class="jar-glow"></div>
          </div>
        </div>
      </button>
      <button class="toy toy-tree" onclick="startGame('hideAndSeek')" aria-label="Hide and Seek">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="tree">
            <div class="tree-trunk"></div>
            <div class="tree-top"></div>
            <div class="tree-top-2"></div>
            <div class="peek-eyes">
              <div class="peek-eye"></div>
              <div class="peek-eye"></div>
            </div>
          </div>
        </div>
      </button>
      <button class="toy toy-sponge" onclick="startGame('cleanTheMess')" aria-label="Clean the Mess">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="sponge">
            <div class="sponge-hole h1"></div>
            <div class="sponge-hole h2"></div>
            <div class="sponge-hole h3"></div>
            <div class="sponge-hole h4"></div>
            <div class="sponge-hole h5"></div>
            <div class="sponge-bubble sb1"></div>
            <div class="sponge-bubble sb2"></div>
            <div class="sponge-bubble sb3"></div>
          </div>
        </div>
      </button>
    </div>

    <div class="shelf-row" style="margin-top: 28px;">
      <button class="toy toy-balloon" onclick="startGame('balloonRace')" aria-label="Balloon Race">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="balloon-group">
            <div class="balloon-body b1"></div>
            <div class="balloon-body b2"></div>
            <div class="balloon-body b3"></div>
            <div class="balloon-strings"></div>
          </div>
        </div>
      </button>
      <button class="toy toy-shapes" onclick="startGame('shapeBuilder')" aria-label="Shape Builder">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="shape-circle"></div>
          <div class="shape-triangle"></div>
          <div class="shape-square"></div>
          <div class="shape-star"></div>
        </div>
      </button>
      <button class="toy toy-shark" onclick="startGame('babyShark')" aria-label="Baby Shark">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="shark">
            <div class="shark-body">
              <div class="shark-belly"></div>
              <div class="shark-eye"></div>
              <div class="shark-blush"></div>
              <div class="shark-mouth"></div>
            </div>
            <div class="shark-fin"></div>
            <div class="shark-tail"></div>
            <div class="shark-fish"></div>
          </div>
        </div>
      </button>
    </div>

    <div class="shelf-row" style="margin-top: 28px;">
      <button class="toy toy-puppy" onclick="startGame('puppyFetch')" aria-label="Puppy Fetch">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="puppy">
            <div class="puppy-tail"></div>
            <div class="puppy-leg bl"><div class="puppy-paw"></div></div>
            <div class="puppy-leg br"><div class="puppy-paw"></div></div>
            <div class="puppy-body"></div>
            <div class="puppy-leg fl"><div class="puppy-paw"></div></div>
            <div class="puppy-leg fr"><div class="puppy-paw"></div></div>
            <div class="puppy-head">
              <div class="puppy-ear left"></div>
              <div class="puppy-ear right"></div>
              <div class="puppy-eye"></div>
              <div class="puppy-muzzle">
                <div class="puppy-nose"></div>
                <div class="puppy-tongue"></div>
              </div>
            </div>
            <div class="puppy-ball"></div>
          </div>
        </div>
      </button>
      <button class="toy toy-elephant" onclick="startGame('elephantSplash')" aria-label="Elephant Splash">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="elephant">
            <div class="ele-body"></div>
            <div class="ele-head">
              <div class="ele-ear"></div>
              <div class="ele-eye"></div>
              <div class="ele-trunk"></div>
            </div>
            <div class="ele-legs">
              <div class="ele-leg"></div>
              <div class="ele-leg"></div>
              <div class="ele-leg"></div>
              <div class="ele-leg"></div>
            </div>
            <div class="ele-splash s1"></div>
            <div class="ele-splash s2"></div>
            <div class="ele-splash s3"></div>
          </div>
        </div>
      </button>
      <button class="toy toy-truck" onclick="startGame('monsterTruck')" aria-label="Monster Truck">
        <div class="toy-sparkle"></div><div class="toy-sparkle"></div><div class="toy-sparkle"></div>
        <div class="toy-icon">
          <div class="mtruck">
            <div class="mtruck-body"></div>
            <div class="mtruck-cab"></div>
            <div class="mtruck-window"></div>
            <div class="mtruck-stripe"></div>
            <div class="mtruck-axle"></div>
            <div class="mtruck-wheel wl"></div>
            <div class="mtruck-wheel wr"></div>
            <div class="mtruck-dirt"></div>
          </div>
        </div>
      </button>
    </div>
  </div>

  <!-- Buddy owl avatar -->
  <div class="buddy" id="buddy" onclick="buddyTapped()" role="button" tabindex="0" aria-label="Buddy owl" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();buddyTapped()}">
    <div class="buddy-hint" id="buddy-hint">Tap a toy!</div>
    <div class="buddy-tap-hand">&#x261D;&#xFE0F;</div>
    <div class="buddy-thought" id="buddy-thought">
      <span class="thought-icon" id="thought-icon"></span>
    </div>
    <div class="buddy-ear left"></div>
    <div class="buddy-ear right"></div>
    <div class="buddy-body">
      <div class="buddy-eyes">
        <div class="buddy-eye"><div class="buddy-pupil"></div></div>
        <div class="buddy-eye"><div class="buddy-pupil"></div></div>
      </div>
      <div class="buddy-beak"></div>
      <div class="buddy-blush left"></div>
      <div class="buddy-blush right"></div>
    </div>
    <div class="buddy-wing left"></div>
    <div class="buddy-wing right"></div>
    <div class="buddy-feet">
      <div class="buddy-foot"></div>
      <div class="buddy-foot"></div>
    </div>
  </div>
  <div class="buddy-point" id="buddy-point">
    <div class="buddy-point-dot"></div>
  </div>
</div>

<button id="back-btn" onclick="goHome()">&#x2190;</button>
<canvas id="game" role="img" aria-label="Game canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div id="game-status" role="status" aria-live="polite" class="sr-only"></div>

<!-- ============ DYNAMIC PLAYROOM SETUP ============ -->
<script>
// Early AudioContext unlock (music box loaded via module)
document.addEventListener('click', function u() {
  var c = window._sharedAudioCtx;
  if (c && c.state === 'suspended') c.resume();
  document.removeEventListener('click', u);
});
document.addEventListener('touchstart', function u() {
  var c = window._sharedAudioCtx;
  if (c && c.state === 'suspended') c.resume();
  document.removeEventListener('touchstart', u);
});
</script>
<script src="/js/libs/confetti.min.js"></script>
</body>
</html>
